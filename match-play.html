<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Match Play</title>
<meta name="application-name" content="Match Play">
<meta name="description" content="Match Play - billiards match scorer">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Match Play">
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --felt: #1a4d2e;
    --felt-light: #246038;
    --felt-dark: #0f2e1b;
    --chalk: #c8d8c0;
    --gold: #d4a843;
    --ivory: #f0ead6;
    --wood: #3b1f0a;
    --neon-green: #39ff85;
    --bg: #0d0d0d;
    --panel: #161616;
    --border: #2a2a2a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ivory);
    overflow: hidden;
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
  }

  /* ─── SCREENS ─── */
  .screen {
    display: none;
    width: 100vw;
    width: 100dvw;
    height: 100vh;
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ─── SETUP SCREEN ─── */
  #setup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1a2a1a 0%, #0d0d0d 70%);
    gap: 12px;
    padding: 14px 20px;
    position: relative;
  }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.08em;
    color: var(--neon-green);
    text-shadow: 0 0 20px rgba(57,255,133,0.4), 0 0 60px rgba(57,255,133,0.15);
    line-height: 1;
  }

  .setup-title span { color: var(--gold); }

  .setup-row {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 600px;
    align-items: flex-end;
  }

  .setup-field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .setup-field label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--chalk);
    opacity: 0.7;
  }

  .setup-field input {
    background: #1a1a1a;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .setup-field input:focus { border-color: var(--neon-green); }
  .setup-field input::placeholder { color: #444; font-weight: 400; }

  .race-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
  }

  .race-row label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--chalk);
    opacity: 0.7;
  }

  /* +/- stepper */
  .stepper {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .stepper-btn {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.4rem;
    font-weight: 700;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .stepper-btn:active { background: rgba(212,168,67,0.15); }

  .stepper-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }

  .stepper-value {
    width: 56px;
    text-align: center;
    background: none;
    border: none;
    color: var(--ivory);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    outline: none;
    -moz-appearance: textfield;
    padding: 0;
  }
  .stepper-value::-webkit-inner-spin-button,
  .stepper-value::-webkit-outer-spin-button { -webkit-appearance: none; }

  /* ── Cue ball break selector ── */
  .break-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 100%;
    max-width: 500px;
  }

  .break-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--chalk);
    opacity: 0.7;
  }

  .break-names {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 8px;
  }

  .break-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.9rem, 3vw, 1.3rem);
    letter-spacing: 0.08em;
    color: #444;
    transition: color 0.3s;
    width: 120px;
  }

  .break-name.p1 { text-align: left; }
  .break-name.p2 { text-align: right; }
  .break-name.active { color: var(--neon-green); }

  .break-track {
    position: relative;
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .break-track-line {
    position: absolute;
    left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(to right, transparent, #333 20%, #333 80%, transparent);
  }

  .cue-ball-wrap {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    cursor: grab;
    touch-action: none;
    z-index: 2;
    transition: filter 0.2s;
  }

  .cue-ball-wrap:active { cursor: grabbing; filter: brightness(1.15); }

  .setup-exit-btn {
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: absolute;
    bottom: 12px;
    right: 12px;
    opacity: 0.6;
    transition: opacity 0.2s, transform 0.2s;
  }
  .setup-exit-btn:active { opacity: 1; transform: scale(0.92); }

  /* ─── GAME SCREEN ─── */
  #game {
    flex-direction: column;
    background: radial-gradient(ellipse at center, #1a2a1a 0%, #0d0d0d 70%);
    position: relative;
    height: 100dvh;
    height: 100vh;
  }

  .game-main {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    overflow: hidden;
    padding-bottom: 56px;
  }

  /* Player panels */
  .player-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 8px;
    position: relative;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.3s;
  }

  /* Player colour panels */
  #p1panel { background: rgba(180, 30, 30, 0.18); }
  #p2panel { background: rgba(30, 60, 180, 0.18); }

  #p1panel:active { background: rgba(180, 30, 30, 0.28); }
  #p2panel:active { background: rgba(30, 60, 180, 0.28); }

  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2.4rem);
    letter-spacing: 0.08em;
    color: var(--chalk);
    text-align: center;
    line-height: 1;
  }

  #p1panel .player-name { color: #e87070; }
  #p2panel .player-name { color: #7090e8; }

  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 14vw, 7rem);
    line-height: 1;
    color: var(--ivory);
    transition: transform 0.1s, color 0.2s;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .score-display.bump {
    animation: scoreBump 0.25s ease-out;
  }

  #p1panel .score-display.bump { color: #ff6b6b; }
  #p2panel .score-display.bump { color: #6b9fff; }

  .score-display.dip {
    animation: scoreDip 0.3s ease-out;
    color: #aaa;
  }

  @keyframes scoreDip {
    0%   { transform: scale(1); }
    40%  { transform: scale(0.88); }
    100% { transform: scale(1); }
  }

  @keyframes scoreBump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .frames-track {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 200px;
  }

  .frame-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid #333;
    background: transparent;
    transition: all 0.25s;
  }

  .frame-dot.won {
    background: var(--neon-green);
    border-color: var(--neon-green);
    box-shadow: 0 0 8px rgba(57,255,133,0.5);
  }

  /* Active player highlighting */
  #p1panel.active-player {
    background: rgba(180, 30, 30, 0.35);
    box-shadow: inset 3px 0 16px rgba(220, 50, 50, 0.25);
  }

  #p2panel.active-player {
    background: rgba(30, 60, 180, 0.35);
    box-shadow: inset -3px 0 16px rgba(50, 80, 220, 0.25);
  }

  #p1panel.active-player .player-name {
    color: #ff8080;
    text-shadow: 0 0 16px rgba(255, 80, 80, 0.5);
  }

  #p2panel.active-player .player-name {
    color: #80aaff;
    text-shadow: 0 0 16px rgba(80, 120, 255, 0.5);
  }

  .player-panel.active-player .score-display {
    color: #ffffff;
    text-shadow: 0 0 20px rgba(255,255,255,0.15);
  }

  /* Centre column */
  .centre-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
    width: 90px;
    border-left: 1px solid #1e1e1e;
    border-right: 1px solid #1e1e1e;
    position: relative;
  }

  /* Turn arrow */
  .turn-arrow {
    position: absolute;
    width: 0;
    height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    filter: drop-shadow(0 0 4px rgba(57,255,133,0.6));
  }

  .turn-arrow.left {
    border-right: 14px solid var(--neon-green);
    border-left: none;
    left: -18px;
  }

  .turn-arrow.right {
    border-left: 14px solid var(--neon-green);
    border-right: none;
    right: -18px;
  }

  .vs-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-shadow: 0 0 16px rgba(212,168,67,0.4);
  }

  .race-to {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
    text-align: center;
    line-height: 1.2;
  }

  .race-to:active { opacity: 0.7; }

  .race-to-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #666;
  }

  .race-to span:last-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--gold);
    line-height: 1;
  }

  /* ─── BOTTOM STRIP ─── */
  .bottom-strip {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    z-index: 50;
    pointer-events: none;
  }

  .icon-btn {
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.65;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: all;
  }

  .icon-btn:active { opacity: 1; transform: scale(0.9); }

  /* ─── WINNER OVERLAY ─── */
  #winner-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.92);
    animation: overlayIn 0.4s ease-out;
  }

  #winner-overlay.show { display: flex; }

  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .winner-felt {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(26,77,46,0.6) 0%, transparent 65%);
    pointer-events: none;
  }

  .winner-content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: winnerDrop 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
  }

  @keyframes winnerDrop {
    from { transform: translateY(-40px) scale(0.85); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .winner-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }

  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 14vw, 7rem);
    letter-spacing: 0.05em;
    color: var(--neon-green);
    line-height: 1;
    text-shadow:
      0 0 30px rgba(57,255,133,0.7),
      0 0 80px rgba(57,255,133,0.3),
      0 0 120px rgba(57,255,133,0.1);
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px rgba(57,255,133,0.7), 0 0 80px rgba(57,255,133,0.3); }
    50%       { text-shadow: 0 0 50px rgba(57,255,133,1),   0 0 120px rgba(57,255,133,0.5); }
  }

  .winner-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 5vw, 2.2rem);
    letter-spacing: 0.15em;
    color: var(--gold);
    line-height: 1;
  }

  .winner-score-line {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: #666;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .balls {
    display: flex;
    gap: 10px;
    margin: 8px 0;
  }

  .ball {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, var(--neon-green) 60%, #0a3a1a);
    box-shadow: 0 0 12px rgba(57,255,133,0.5), inset 0 -3px 6px rgba(0,0,0,0.4);
    animation: ballFloat 2s ease-in-out infinite;
  }

  .ball:nth-child(2) { animation-delay: 0.3s; }
  .ball:nth-child(3) { animation-delay: 0.6s; }
  .ball:nth-child(4) { animation-delay: 0.9s; }
  .ball:nth-child(5) { animation-delay: 1.2s; }

  @keyframes ballFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  .winner-btns {
    margin-top: 16px;
    display: flex;
    gap: 14px;
  }

  .play-again-btn {
    background: var(--felt);
    border: 2px solid var(--neon-green);
    border-radius: 10px;
    color: var(--neon-green);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    padding: 10px 32px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(57,255,133,0.15);
    -webkit-tap-highlight-color: transparent;
  }

  .play-again-btn:active { transform: scale(0.95); }

  .return-btn {
    background: none;
    border: 2px solid var(--gold);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    padding: 10px 32px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .return-btn:active { transform: scale(0.95); }

  /* Confetti particles */
  .confetti-wrap {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 1px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }


  #raceto-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
  }
  #raceto-modal.show { display: flex; }

  .raceto-popup {
    background: #1a1a1a;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-width: 200px;
    animation: popIn 0.2s cubic-bezier(0.22,1,0.36,1);
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .raceto-popup label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--chalk);
    opacity: 0.7;
  }

  .raceto-popup input[type=number] {
    background: #0d0d0d;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    text-align: center;
    width: 100px;
    padding: 6px 10px;
    outline: none;
    -moz-appearance: textfield;
  }
  .raceto-popup input[type=number]::-webkit-inner-spin-button,
  .raceto-popup input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .raceto-popup input[type=number]:focus { border-color: var(--neon-green); }

  .raceto-popup-btns {
    display: flex;
    gap: 10px;
  }

  .raceto-confirm {
    background: var(--felt);
    border: 1.5px solid var(--neon-green);
    border-radius: 8px;
    color: var(--neon-green);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    padding: 8px 22px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .raceto-cancel {
    background: none;
    border: 1.5px solid #333;
    border-radius: 8px;
    color: #555;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    padding: 8px 22px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Responsive tweaks for small screens */
  @media (max-height: 380px) {
    .score-display { font-size: clamp(3.5rem, 14vw, 6rem); }
    .setup-title { font-size: 1.8rem; }
    #setup { gap: 12px; padding: 12px; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup" class="screen active">
  <div class="setup-title">MATCH <span>PLAY</span></div>

  <div class="setup-row">
    <div class="setup-field">
      <label>Player 1</label>
      <input type="text" id="p1name" placeholder="Enter name" maxlength="14" autocomplete="off">
    </div>
    <div class="setup-field">
      <label>Player 2</label>
      <input type="text" id="p2name" placeholder="Enter name" maxlength="14" autocomplete="off">
    </div>
  </div>

  <div class="race-row">
    <label>Race to (frames)</label>
    <div class="stepper">
      <button class="stepper-btn" id="stepDown">−</button>
      <div class="stepper-divider"></div>
      <input class="stepper-value" type="number" id="raceInput" value="7" min="1" max="99">
      <div class="stepper-divider"></div>
      <button class="stepper-btn" id="stepUp">+</button>
    </div>
  </div>

  <div class="break-section">
    <div class="break-label">Who breaks? Slide the ball</div>
    <div class="break-names">
      <div class="break-name p1" id="breakName1">PLAYER 1</div>
      <div class="break-name p2" id="breakName2">PLAYER 2</div>
    </div>
    <div class="break-track" id="breakTrack">
      <div class="break-track-line"></div>
      <div class="cue-ball-wrap" id="cueBall">
        <svg width="50" height="50" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="ballGrad" cx="38%" cy="32%" r="60%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="35%" stop-color="#f0f0ee"/>
              <stop offset="75%" stop-color="#d8d8d4"/>
              <stop offset="100%" stop-color="#b0b0aa"/>
            </radialGradient>
            <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
              <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
            </radialGradient>

<!-- RACE TO MODAL -->
<div id="raceto-modal">
  <div class="raceto-popup">
    <label>Race to (frames)</label>
    <input type="number" id="racetoInput" min="1" max="99">
    <div class="raceto-popup-btns">
      <button class="raceto-cancel" onclick="closeRaceToModal()">CANCEL</button>
      <button class="raceto-confirm" onclick="confirmRaceTo()">SET</button>
    </div>
  </div>
</div>

<script>
  let scores = [0, 0];
  let raceTo = 7;
  let names = ['PLAYER 1', 'PLAYER 2'];
  let history = []; // [{player: 0|1}]
  let matchOver = false;
  let lastWinner = null;

  function openRaceToModal() {
    document.getElementById('racetoInput').value = raceTo;
    document.getElementById('raceto-modal').classList.add('show');
    setTimeout(() => document.getElementById('racetoInput').select(), 50);
  }

  function closeRaceToModal() {
    document.getElementById('raceto-modal').classList.remove('show');
  }

  function confirmRaceTo() {
    const val = parseInt(document.getElementById('racetoInput').value);
    if (!val || val < 1) return;
    raceTo = val;
    document.getElementById('raceDisplay').textContent = raceTo;
    for (let i = 0; i < 2; i++) {
      if (scores[i] >= raceTo && !matchOver) {
        matchOver = true;
        closeRaceToModal();
        setTimeout(() => showWinner(i), 200);
        return;
      }
    }
    closeRaceToModal();
  }

  // Close modal on backdrop tap
  document.getElementById('raceto-modal').addEventListener('click', function(e) {
    if (e.target === this) closeRaceToModal();
  });


  // ── Active player system ──
  let activePlayer = 0; // set when match starts

  function setActivePlayer(p) {
    activePlayer = p;
    document.getElementById('p1panel').classList.toggle('active-player', p === 0);
    document.getElementById('p2panel').classList.toggle('active-player', p === 1);
    const arrow = document.getElementById('turnArrow');
    arrow.className = 'turn-arrow ' + (p === 0 ? 'left' : 'right');
  }

  // Touch handlers for each panel
  [['p1panel', 0], ['p2panel', 1]].forEach(([id, player]) => {
    const el = document.getElementById(id);
    let touchStartY = null;
    let touchStartX = null;
    let moved = false;

    el.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
      moved = false;
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      if (touchStartY === null) return;
      const dy = e.touches[0].clientY - touchStartY;
      const dx = e.touches[0].clientX - touchStartX;
      if (Math.abs(dy) > 8 || Math.abs(dx) > 8) moved = true;
    }, { passive: true });

    el.addEventListener('touchend', e => {
      if (touchStartY === null) return;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      const isSwipeDown  = dy >  40 && absY > absX * 1.2;
      const isSwipeUp    = dy < -40 && absY > absX * 1.2;
      const isSwipeLeft  = dx < -40 && absX > absY * 1.2;
      const isSwipeRight = dx >  40 && absX > absY * 1.2;

      if (isSwipeLeft) {
        setActivePlayer(0); // swipe left → Player 1
      } else if (isSwipeRight) {
        setActivePlayer(1); // swipe right → Player 2
      } else if (isSwipeDown) {
        removePoint(activePlayer);
      } else if (isSwipeUp) {
        addPoint(activePlayer);
      } else if (!moved) {
        addPoint(activePlayer); // tap still adds for active player
      }
      touchStartY = null;
      touchStartX = null;
      moved = false;
    }, { passive: true });

    // Mouse fallback for desktop
    el.addEventListener('click', () => {
      if (!('ontouchstart' in window)) {
        if (player !== activePlayer) {
          setActivePlayer(player);
        } else {
          addPoint(activePlayer);
        }
      }
    });
  });

  // ── Stepper ──
  const raceInput = document.getElementById('raceInput');
  document.getElementById('stepDown').addEventListener('click', () => {
    const v = parseInt(raceInput.value) || 7;
    if (v > 1) raceInput.value = v - 1;
  });
  document.getElementById('stepUp').addEventListener('click', () => {
    const v = parseInt(raceInput.value) || 7;
    if (v < 99) raceInput.value = v + 1;
  });
  raceInput.addEventListener('change', () => {
    let v = parseInt(raceInput.value);
    if (!v || v < 1) v = 1;
    if (v > 99) v = 99;
    raceInput.value = v;
  });

  // ── Cue ball drag ──
  let breakPlayer = null; // 0 = p1, 1 = p2, null = centre
  const cueBall   = document.getElementById('cueBall');
  const breakTrack = document.getElementById('breakTrack');
  let dragStartX  = null;
  let ballOffset  = 0;
  const SNAP_DIST = 60;

  function getBallLimits() {
    const trackRect = breakTrack.getBoundingClientRect();
    const ballW = cueBall.offsetWidth;
    const centre = trackRect.width / 2 - ballW / 2;
    const leftSnap  = 10;
    const rightSnap = trackRect.width - ballW - 10;
    return { centre, leftSnap, rightSnap, trackWidth: trackRect.width };
  }

  function updateBreakNames() {
    document.getElementById('breakName1').classList.toggle('active', breakPlayer === 0);
    document.getElementById('breakName2').classList.toggle('active', breakPlayer === 1);
  }

  function snapBall(x) {
    const { centre, leftSnap, rightSnap, trackWidth } = getBallLimits();
    const mid = trackWidth / 2 - cueBall.offsetWidth / 2;
    if (x < mid - SNAP_DIST) {
      cueBall.style.left = leftSnap + 'px';
      cueBall.style.transform = 'none';
      breakPlayer = 0;
    } else if (x > mid + SNAP_DIST) {
      cueBall.style.left = rightSnap + 'px';
      cueBall.style.transform = 'none';
      breakPlayer = 1;
    } else {
      cueBall.style.left = '50%';
      cueBall.style.transform = 'translateX(-50%)';
      breakPlayer = null;
    }
    updateBreakNames();
    // Auto-start as soon as a player is selected
    if (breakPlayer !== null) {
      setTimeout(() => startMatch(), 350);
    }
  }

  // Touch drag
  cueBall.addEventListener('touchstart', e => {
    dragStartX = e.touches[0].clientX;
    const rect = cueBall.getBoundingClientRect();
    const trackRect = breakTrack.getBoundingClientRect();
    ballOffset = rect.left - trackRect.left;
    cueBall.style.transition = 'none';
    cueBall.style.transform = 'none';
  }, { passive: true });

  cueBall.addEventListener('touchmove', e => {
    if (dragStartX === null) return;
    const dx = e.touches[0].clientX - dragStartX;
    const trackRect = breakTrack.getBoundingClientRect();
    let newX = ballOffset + dx;
    newX = Math.max(0, Math.min(newX, trackRect.width - cueBall.offsetWidth));
    cueBall.style.left = newX + 'px';
    cueBall.style.transform = 'none';
  }, { passive: true });

  cueBall.addEventListener('touchend', e => {
    if (dragStartX === null) return;
    cueBall.style.transition = 'left 0.25s cubic-bezier(0.22,1,0.36,1)';
    const trackRect = breakTrack.getBoundingClientRect();
    const rect = cueBall.getBoundingClientRect();
    const currentX = rect.left - trackRect.left;
    snapBall(currentX);
    dragStartX = null;
  }, { passive: true });

  // Mouse drag (desktop)
  cueBall.addEventListener('mousedown', e => {
    dragStartX = e.clientX;
    const rect = cueBall.getBoundingClientRect();
    const trackRect = breakTrack.getBoundingClientRect();
    ballOffset = rect.left - trackRect.left;
    cueBall.style.transition = 'none';
    cueBall.style.transform = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (dragStartX === null) return;
    const dx = e.clientX - dragStartX;
    const trackRect = breakTrack.getBoundingClientRect();
    let newX = ballOffset + dx;
    newX = Math.max(0, Math.min(newX, trackRect.width - cueBall.offsetWidth));
    cueBall.style.left = newX + 'px';
  });
  document.addEventListener('mouseup', e => {
    if (dragStartX === null) return;
    cueBall.style.transition = 'left 0.25s cubic-bezier(0.22,1,0.36,1)';
    const trackRect = breakTrack.getBoundingClientRect();
    const rect = cueBall.getBoundingClientRect();
    const currentX = rect.left - trackRect.left;
    snapBall(currentX);
    dragStartX = null;
  });

  // Update break names when player names change
  ['p1name','p2name'].forEach((id, i) => {
    document.getElementById(id).addEventListener('input', e => {
      const val = e.target.value.trim().toUpperCase() || (i === 0 ? 'PLAYER 1' : 'PLAYER 2');
      document.getElementById(i === 0 ? 'breakName1' : 'breakName2').textContent = val;
    });
  });

  function startMatch() {
    const p1 = document.getElementById('p1name').value.trim().toUpperCase() || 'PLAYER 1';
    const p2 = document.getElementById('p2name').value.trim().toUpperCase() || 'PLAYER 2';
    names = [p1, p2];
    raceTo = parseInt(raceInput.value) || 7;

    scores = [0, 0];
    history = [];
    matchOver = false;

    document.getElementById('p1display').textContent = p1;
    document.getElementById('p2display').textContent = p2;
    document.getElementById('p1score').textContent = '0';
    document.getElementById('p2score').textContent = '0';
    document.getElementById('raceDisplay').textContent = raceTo;

    buildTracks();
    setActivePlayer(breakPlayer !== null ? breakPlayer : 0);
    showScreen('game');
  }

  function buildTracks() { /* dots removed */ }
  function updateTracks() { /* dots removed */ }

  function addPoint(player) {
    if (matchOver) return;
    scores[player]++;
    history.push({ player });

    const scoreEl = document.getElementById(player === 0 ? 'p1score' : 'p2score');
    scoreEl.textContent = scores[player];
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('bump');

    updateTracks();

    if (scores[player] >= raceTo) {
      matchOver = true;
      setTimeout(() => showWinner(player), 350);
    }
  }

  function undoPoint() {
    if (history.length === 0 || matchOver) return;
    const last = history.pop();
    scores[last.player] = Math.max(0, scores[last.player] - 1);

    const scoreEl = document.getElementById(last.player === 0 ? 'p1score' : 'p2score');
    scoreEl.textContent = scores[last.player];
    updateTracks();
  }

  function removePoint(player) {
    if (matchOver || scores[player] === 0) return;
    scores[player]--;
    // Also trim history if last entry was this player
    for (let i = history.length - 1; i >= 0; i--) {
      if (history[i].player === player) { history.splice(i, 1); break; }
    }
    const scoreEl = document.getElementById(player === 0 ? 'p1score' : 'p2score');
    scoreEl.textContent = scores[player];
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('dip');
    setTimeout(() => scoreEl.classList.remove('dip'), 300);
    updateTracks();
  }

  function showWinner(player) {
    document.getElementById('winnerName').textContent = names[player];
    document.getElementById('winnerScoreLine').textContent =
      `${names[player]} ${scores[player]} – ${names[1 - player]} ${scores[1 - player]}`;
    lastWinner = player;
    spawnConfetti();
    const overlay = document.getElementById('winner-overlay');
    overlay.classList.add('show');
  }

  function rematch() {
    // Winner of the match breaks the rematch
    document.getElementById('winner-overlay').classList.remove('show');
    scores = [0, 0];
    history = [];
    matchOver = false;
    raceTo = 7;
    document.getElementById('raceDisplay').textContent = raceTo;
    document.getElementById('p1score').textContent = '0';
    document.getElementById('p2score').textContent = '0';
    setActivePlayer(lastWinner !== null ? lastWinner : 0);
    showScreen('game');
  }

  function returnToSetup() {
    document.getElementById('winner-overlay').classList.remove('show');
    // Clear name fields
    document.getElementById('p1name').value = '';
    document.getElementById('p2name').value = '';
    // Reset break names display
    document.getElementById('breakName1').textContent = 'PLAYER 1';
    document.getElementById('breakName2').textContent = 'PLAYER 2';
    // Reset race to 7
    raceTo = 7;
    document.getElementById('raceInput').value = 7;
    // Reset cue ball to centre
    breakPlayer = null;
    lastWinner = null;
    cueBall.style.transition = 'left 0.3s cubic-bezier(0.22,1,0.36,1)';
    cueBall.style.left = '50%';
    cueBall.style.transform = 'translateX(-50%)';
    document.getElementById('breakName1').classList.remove('active');
    document.getElementById('breakName2').classList.remove('active');
    showScreen('setup');
  }

  function spawnConfetti() {
    const wrap = document.getElementById('confettiWrap');
    wrap.innerHTML = '';
    const colors = ['#39ff85','#d4a843','#ffffff','#1a4d2e','#f0ead6','#ff6b35'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.top = '-20px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = (6 + Math.random() * 8) + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      p.style.animationDuration = (2 + Math.random() * 3) + 's';
      p.style.animationDelay = (Math.random() * 1.5) + 's';
      wrap.appendChild(p);
    }
  }

  function goToSetup() {
    document.getElementById('winner-overlay').classList.remove('show');
    // Reset race to 7
    raceTo = 7;
    document.getElementById('raceInput').value = 7;
    // Reset cue ball to centre
    breakPlayer = null;
    cueBall.style.transition = 'left 0.3s cubic-bezier(0.22,1,0.36,1)';
    cueBall.style.left = '50%';
    cueBall.style.transform = 'translateX(-50%)';
    document.getElementById('breakName1').classList.remove('active');
    document.getElementById('breakName2').classList.remove('active');
    showScreen('setup');
  }

  function exitApp() {
    window.close();
    // Fallback for browsers that block window.close()
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0d0d;font-family:sans-serif;color:#444;font-size:1rem;letter-spacing:0.1em;text-transform:uppercase;">You can now close this tab</div>';
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Register service worker for PWA installability
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
